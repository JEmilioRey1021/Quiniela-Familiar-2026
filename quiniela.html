<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b1926;--card:#122030;--card2:#172840;--brd:#1e3347;
  --g1:#012515;--g2:#064e3b;--gm:#15803d;
  --gold:#f59e0b;--gold2:#d97706;--goldd:#fbbf24;
  --red:#ef4444;
  --t1:#f0f6fc;--t2:#8fb3cc;--t3:#4a7a96;--t4:#2a4d63;
  --ui:'Inter',system-ui,sans-serif;--sport:'Oswald',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--ui);background:var(--bg);color:var(--t1);min-height:100vh}
button{border:none;cursor:pointer;font-family:var(--ui)}
button:active{transform:scale(.96)}
input{font-family:var(--ui)}

.loading-screen{position:fixed;inset:0;background:linear-gradient(160deg,#010d16,#012515 60%,#0b1926);
  z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  color:#fff;transition:opacity .5s;}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-ball{font-size:56px;animation:spin 1.2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.loading-txt{font-family:var(--sport);font-size:20px;letter-spacing:3px}
.loading-sub{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:2px}

.hdr{background:linear-gradient(150deg,#010d16 0%,#012515 40%,#064e3b 100%);
  padding:12px 16px 10px;position:sticky;top:0;z-index:300;
  box-shadow:0 2px 20px rgba(0,0,0,.7);overflow:hidden;}
.hdr::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,.025) 28px,rgba(255,255,255,.025) 56px);
  pointer-events:none;}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-ball{font-size:26px;filter:drop-shadow(0 2px 8px rgba(0,255,100,.3))}
.hdr h1{font-family:var(--sport);font-size:20px;color:#fff;letter-spacing:2px}
.hdr p{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:3px;margin-top:2px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.btn-next{padding:7px 13px;border-radius:20px;background:rgba(255,255,255,.1);color:#fff;
  font-size:12px;font-weight:800;letter-spacing:.3px;border:1.5px solid rgba(255,255,255,.2);white-space:nowrap;}
.btn-next:hover{background:rgba(255,255,255,.2)}
.sync-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);letter-spacing:.3px;text-align:center;transition:all .3s;}
.sync-badge.saving{background:rgba(245,158,11,.2);color:var(--gold)}
.sync-badge.saved{background:rgba(74,222,128,.15);color:#4ade80}
.sync-badge.error{background:rgba(248,113,113,.2);color:#f87171}

.bolsa{background:linear-gradient(135deg,#7c3500,#b45309);padding:10px 18px;
  display:flex;align-items:center;gap:12px;position:sticky;top:50px;z-index:299;
  box-shadow:0 2px 12px rgba(0,0,0,.5);}
.bolsa-icon{font-size:22px}
.bolsa-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.65)}
.bolsa-num{font-family:var(--sport);font-size:28px;color:#fff;letter-spacing:2px;line-height:1}
.bolsa-sub{margin-left:auto;font-size:10px;color:rgba(255,255,255,.55);text-align:right;line-height:1.4}

.tabs{background:#0e2035;border-bottom:1px solid var(--brd);display:flex;position:sticky;top:98px;z-index:298;}
.tab{flex:1;padding:12px 10px;font-size:13px;font-weight:800;letter-spacing:.5px;
  color:var(--t3);background:transparent;border-bottom:3px solid transparent;text-transform:uppercase}
.tab.on{color:#4ade80;border-bottom-color:#4ade80}


.view{display:none}
.view.on{display:block}

.group-section{margin-bottom:20px}
.group-header{display:flex;align-items:center;gap:10px;padding:10px 0 8px;margin-bottom:10px;border-bottom:1px solid var(--brd);}
.gbadge{font-family:var(--sport);font-size:13px;padding:4px 14px;border-radius:20px;letter-spacing:1px;}
.gb-grupo{background:linear-gradient(135deg,#1a3a52,#1e4a6a);color:#7dd3fc;border:1px solid #1e4a6a}
.gb-round{background:linear-gradient(135deg,#3b1a52,#5b1e7a);color:#d8b4fe;border:1px solid #5b1e7a}
.gb-final{background:linear-gradient(135deg,var(--gold2),#92400e);color:#fff;border:1px solid var(--gold)}
.group-count{font-size:11px;color:var(--t3);margin-left:auto}

.mc{background:var(--card);border-radius:14px;border:1px solid var(--brd);
  margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.4);transition:box-shadow .2s;}
.mc.editing{box-shadow:0 0 0 2px var(--gm),0 4px 20px rgba(21,128,61,.3)}
.mc-bar{display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;background:var(--card2);border-bottom:1px solid var(--brd);}
.mc-done{font-size:10px;font-weight:700;color:#4ade80}
.mc-win{font-size:11px;font-weight:800;color:var(--goldd);letter-spacing:.2px}
.mc-pend{font-size:10px;font-weight:600;color:var(--t3)}
.mc-date{font-size:10px;color:var(--t3);font-weight:600}
.pot-badge{font-size:10px;font-weight:800;color:var(--goldd);
  background:rgba(245,158,11,.1);padding:2px 8px;border-radius:10px;border:1px solid rgba(245,158,11,.2)}

.mc-body{padding:18px 12px 14px}
.match-row{display:flex;align-items:center;justify-content:space-between;gap:4px}

.team{flex:1;text-align:center;position:relative;border-radius:10px;overflow:hidden;padding:10px 6px 8px}
.team-flag-bg{position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:0.1;filter:blur(4px);transform:scale(1.2);pointer-events:none;}
.team-flag-img{width:56px;height:37px;object-fit:cover;border-radius:5px;
  box-shadow:0 3px 14px rgba(0,0,0,.6);margin:0 auto 8px;display:block;position:relative;z-index:1;}
.team-name{font-family:var(--sport);font-size:13px;color:var(--t1);
  letter-spacing:.5px;line-height:1.2;position:relative;z-index:1;}

.score-box{flex-shrink:0;text-align:center;min-width:90px;cursor:pointer;
  padding:6px;border-radius:12px;transition:background .15s;}
.score-box:hover{background:rgba(255,255,255,.04)}
.score-nums{font-family:var(--sport);font-size:44px;font-weight:700;color:#fff;
  letter-spacing:6px;line-height:1;display:flex;align-items:center;justify-content:center;gap:2px;
  text-shadow:0 2px 12px rgba(0,0,0,.6);}
.score-dash{font-size:30px;color:var(--t3);margin:0 2px}
.vs-txt{font-family:var(--sport);font-size:22px;color:var(--t4);letter-spacing:3px;line-height:1}
.score-hint{font-size:10px;color:var(--t4);margin-top:5px;font-weight:600}
.final-txt{font-size:10px;color:#4ade80;font-weight:700;margin-top:3px;letter-spacing:.3px}

.score-edit{display:flex;flex-direction:column;align-items:center;gap:8px;padding:4px 0}
.se-row{display:flex;align-items:center;gap:6px}
.sei{width:52px;padding:4px 2px;border:2.5px solid var(--gm);border-radius:10px;
  font-family:var(--sport);font-size:34px;font-weight:700;text-align:center;color:#fff;background:var(--card2);}
.sei:focus{outline:none;border-color:var(--gold)}
.sei-dash{font-family:var(--sport);font-size:28px;color:var(--t3)}
.se-btns{display:flex;gap:6px}
.se-ok{padding:6px 14px;background:var(--gm);color:#fff;border-radius:8px;font-size:13px;font-weight:800}
.se-del{padding:6px 10px;background:rgba(239,68,68,.15);color:#f87171;border-radius:8px;font-size:13px;font-weight:800;border:1px solid rgba(239,68,68,.2)}
.se-x{padding:6px 10px;background:rgba(255,255,255,.05);color:var(--t2);border-radius:8px;font-size:13px;font-weight:800;border:1px solid var(--brd)}

.chips-wrap{border-top:1px solid var(--brd);overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:10px 12px 12px;display:flex;gap:8px;align-items:stretch;}
.chips-wrap::-webkit-scrollbar{height:3px}
.chips-wrap::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
.chip{flex-shrink:0;cursor:pointer;background:rgba(255,255,255,.04);
  border:1.5px solid var(--brd);border-radius:11px;padding:7px 11px;min-width:72px;text-align:center;transition:all .15s;}
.chip:hover{border-color:var(--gm);background:rgba(21,128,61,.1)}
.chip:active{transform:scale(.95)}
.chip.win{background:linear-gradient(160deg,rgba(245,158,11,.2),rgba(245,158,11,.08));
  border-color:var(--gold);box-shadow:0 3px 10px rgba(245,158,11,.2);}
.chip.no-pred{opacity:.3}
.chip.chip-editing{min-width:106px;border-color:var(--gm);background:rgba(21,128,61,.1);cursor:default}
.chip-name{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#fff;margin-bottom:5px;white-space:nowrap}
.win .chip-name{color:var(--goldd)}
.chip-score{font-family:var(--sport);font-size:17px;color:var(--t1);letter-spacing:1px}
.win .chip-score{color:var(--goldd)}
.chip-crown{font-size:11px;display:block;margin-top:2px}
.chip-edit-hint{font-size:8px;color:var(--t4);margin-top:3px}
.chip-edit-row{display:flex;align-items:center;gap:3px;margin-top:4px;justify-content:center}
.cie{width:28px;padding:2px 1px;border:1.5px solid var(--gm);border-radius:5px;
  font-family:var(--sport);font-size:15px;font-weight:700;text-align:center;color:#fff;background:var(--card2);}
.cie:focus{outline:none;border-color:var(--gold)}
.cie-sep{font-family:var(--sport);font-size:13px;color:var(--t3)}
.cie-ok{padding:3px 7px;background:var(--gm);color:#fff;border-radius:5px;font-size:12px;font-weight:800;margin-left:2px}
.cie-del{padding:3px 5px;background:rgba(239,68,68,.15);color:#f87171;border-radius:5px;font-size:12px;font-weight:800;margin-left:1px;border:1px solid rgba(239,68,68,.2)}
.no-preds{padding:10px 14px;font-size:12px;color:var(--t3);border-top:1px solid var(--brd);font-style:italic}
.winner-bar{padding:7px 14px;background:rgba(21,128,61,.15);border-top:1px solid rgba(21,128,61,.3);font-size:12px;font-weight:700;color:#4ade80}

.rank-banner{background:linear-gradient(135deg,#010d16,#012515 60%,var(--g2));
  border-radius:16px;padding:16px 18px;margin:14px 14px 18px;
  display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);border:1px solid var(--brd);}
.rank-banner h2{font-family:var(--sport);font-size:20px;color:#fff;letter-spacing:2px}
.rank-banner p{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:0 14px 20px}
.pod{flex:1;max-width:110px;text-align:center}
.pod.p1{order:2}.pod.p2{order:1}.pod.p3{order:3}

.pod-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--t1);line-height:1.2;margin-bottom:5px}
.pod-q{font-family:var(--sport);font-size:20px;color:#4ade80;margin-bottom:3px}
.pod-ac{font-size:10px;color:var(--t3)}
.pod-base{border-radius:8px 8px 0 0;padding:10px 4px;margin-top:6px;border:1px solid var(--brd)}
.p1 .pod-base{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.3);min-height:56px}
.p2 .pod-base{background:var(--card2);min-height:36px}
.p3 .pod-base{background:var(--card2);min-height:20px}
.rank-list{display:flex;flex-direction:column;gap:8px;padding:0 14px}
.rank-row{background:var(--card);border-radius:12px;border:1px solid var(--brd);
  padding:13px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.rk-pos{font-size:15px;width:24px;text-align:center;font-weight:800;color:var(--t3)}
.rk-name{flex:1;font-size:15px;font-weight:800;color:var(--t1)}
.rk-stats{text-align:right}
.rk-ac{font-size:11px;color:var(--t3);margin-bottom:2px}
.rk-q{font-family:var(--sport);font-size:21px;color:#4ade80}

.btn-add-result{
  margin-top:10px;padding:8px 18px;
  background:var(--gm);color:#fff;border-radius:20px;
  font-size:12px;font-weight:800;letter-spacing:.5px;
  box-shadow:0 2px 10px rgba(21,128,61,.4);
  display:inline-block;
}
.btn-add-result:active{transform:scale(.95)}
.btn-edit-result{
  margin-top:6px;padding:4px 14px;
  background:rgba(255,255,255,.08);color:var(--t2);border-radius:12px;
  font-size:11px;font-weight:700;border:1px solid var(--brd);
  display:inline-block;
}
.day-group{margin-bottom:8px}
.day-header{
  font-size:11px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--t3);
  padding:16px 0 8px;border-bottom:1px solid var(--brd);
  margin-bottom:10px;display:flex;align-items:center;gap:10px;
}
.day-header::before,.day-header::after{content:'';flex:1;height:1px;background:var(--brd)}

.rk-avatar{
  border-radius:50%;background-size:cover;background-position:center;
  flex-shrink:0;border:2px solid;display:inline-flex;align-items:center;justify-content:center;
  margin:0 auto;
}
.rk-avatar-ini{font-family:var(--sport);font-size:14px;color:#fff;letter-spacing:1px}

.pod-avatar-wrap{
  position:relative;display:inline-block;margin:0 auto 8px;
}
.pod-avatar-wrap .rk-avatar{
  display:block;margin:0 auto;
}
.pod-badge{
  position:absolute;bottom:0;right:-4px;
  width:24px;height:24px;border-radius:50%;
  font-family:var(--sport);font-size:14px;font-weight:800;color:#000;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);box-shadow:0 2px 6px rgba(0,0,0,.4);
}

.phase-tabs{display:flex;gap:8px;padding:12px 14px 10px;overflow-x:auto;
  position:sticky;top:98px;z-index:297;
  background:var(--bg);border-bottom:1px solid var(--brd);}
.phase-tabs::-webkit-scrollbar{height:0}
.ptab{flex-shrink:0;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:800;
  background:var(--card);color:var(--t3);border:1.5px solid var(--brd);white-space:nowrap;transition:all .2s;}
.ptab.on{background:var(--gm);color:#fff;border-color:var(--gm);box-shadow:0 2px 12px rgba(21,128,61,.4)}
.phase-section{display:none;padding:12px 14px 90px}
.phase-section.on{display:block}

.mc-live{font-size:10px;font-weight:800;color:#4ade80;display:flex;align-items:center;gap:5px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.chip.locked{cursor:default;opacity:.75}
.chip.locked:hover{border-color:var(--brd);background:rgba(255,255,255,.04)}
.chip-locked-hint{font-size:8px;color:var(--t4);margin-top:3px}

/* ─── BRACKET ─── */
.bracket-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 90px}
.bracket-outer::-webkit-scrollbar{height:4px}
.bracket-outer::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
.bracket-body{display:flex;align-items:stretch;gap:0;min-width:860px}
.bracket-hdrs{display:flex;min-width:860px;gap:0;margin-bottom:8px;padding:0 14px}
.bracket-hdr{font-family:var(--sport);font-size:11px;font-weight:700;letter-spacing:1px;
  color:var(--t3);text-align:center;text-transform:uppercase;flex-shrink:0}
/* columns */
.br-col{display:flex;flex-direction:column;justify-content:space-around;flex-shrink:0}
.br-col-r32{width:148px}
.br-col-r16{width:148px}
.br-col-qf{width:148px}
.br-col-sf{width:148px}
.br-col-final{width:148px}
/* connector columns */
.br-conn{width:20px;display:flex;flex-direction:column;flex-shrink:0}
.br-conn-grp{flex:1;display:flex;flex-direction:column}
.br-conn-top{flex:1;border-right:2px solid var(--brd);border-bottom:2px solid var(--brd);border-radius:0 0 4px 0}
.br-conn-bot{flex:1;border-right:2px solid var(--brd);border-top:2px solid var(--brd);border-radius:0 4px 0 0}
/* match cards */
.bm{background:var(--card);border:1px solid var(--brd);border-radius:8px;overflow:hidden;
  margin:2px 0;box-shadow:0 1px 6px rgba(0,0,0,.3);min-width:144px}
.bmt{display:flex;align-items:center;gap:6px;padding:7px 8px;border-bottom:1px solid var(--brd);
  font-size:11px;font-weight:700;color:var(--t1);min-height:34px}
.bmt:last-child{border-bottom:none}
.bmt.bmt-w{background:rgba(245,158,11,.15);color:var(--goldd)}
.bmt.bmt-w .bm-name{color:var(--goldd)}
.bm-flag{width:22px;height:15px;object-fit:cover;border-radius:2px;flex-shrink:0}
.bm-flag-ph{width:22px;height:15px;background:var(--brd);border-radius:2px;flex-shrink:0}
.bm-name{flex:1;font-size:10px;font-weight:800;letter-spacing:.3px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:78px}
.bm-score{font-family:var(--sport);font-size:13px;color:#fff;margin-left:auto;flex-shrink:0}
.bmt.bmt-w .bm-score{color:var(--goldd)}
.bm-tbd .bm-name{color:var(--t4);font-weight:600}
/* spacer between bracket halves */
.br-half-div{height:20px;background:transparent}
/* final special */
.bm.bm-final{border-color:var(--gold);box-shadow:0 0 12px rgba(245,158,11,.3)}
.bm.bm-final .bmt.bmt-w{background:linear-gradient(135deg,rgba(245,158,11,.25),rgba(245,158,11,.1))}
/* 3rd place */
.br-3rd-label{font-size:10px;font-weight:800;color:var(--t3);text-align:center;
  text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px}

/* ─── PUNTUACIÓN ELIMINATORIAS ─── */
.chip-pts{font-size:9px;font-weight:800;margin-top:2px;padding:1px 5px;border-radius:5px;display:inline-block}
.pts-5{background:rgba(245,158,11,.3);color:var(--goldd)}
.pts-3{background:rgba(99,102,241,.25);color:#a5b4fc}
.pts-1{background:rgba(255,255,255,.08);color:var(--t2)}
.pts-0{background:rgba(239,68,68,.1);color:var(--t3);opacity:.6}
.pts-b{background:rgba(74,222,128,.2);color:#4ade80}
.chip-pen-note{font-size:8px;color:var(--t3);margin-top:1px;letter-spacing:.3px}
.chip.hit3{border-color:rgba(99,102,241,.45);background:rgba(99,102,241,.07)}
.chip.miss{opacity:.5}
/* penalty selectors */
.pen-chip-wrap{display:flex;align-items:center;gap:4px;margin-top:5px;flex-wrap:wrap;justify-content:center}
.pen-score-wrap{display:flex;align-items:center;gap:6px;margin:8px 0 4px;justify-content:center}
.pen-lbl{font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.pen-btn{padding:3px 7px;border-radius:7px;background:rgba(255,255,255,.06);
  color:var(--t2);font-size:10px;font-weight:800;border:1.5px solid var(--brd);cursor:pointer;transition:all .15s}
.pen-btn:hover{border-color:var(--gm);background:rgba(21,128,61,.12)}
.pen-btn.pen-on{background:rgba(21,128,61,.25);color:#4ade80;border-color:var(--gm)}
/* pts ranking */
.pts-bnr{background:linear-gradient(135deg,#010d16,#1a003b 60%,#2d1869);
  border-radius:16px;padding:16px 18px;margin:14px 14px 18px;
  display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);border:1px solid #3b1a6b;}
.pts-bnr h2{font-family:var(--sport);font-size:20px;color:#fff;letter-spacing:2px}
.pts-bnr p{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.rk-q-pts{font-family:var(--sport);font-size:21px;color:#a5b4fc}
</style>
</head>
<body>

let state={resultados:{},predicciones:{}};
let pendingSave=false;
let editScore=null,editChip=null,saving=false;
let editScorePen=null;

async function loadState(){
  try{
    const r=await Promise.race([
      fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY}}),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),7000))
    ]);
    const d=await r.json();
    if(d&&d.record){
      // Mezclar nube con local para no perder cambios recientes
      const bk=localStorage.getItem('q26bk');
      const local=bk?JSON.parse(bk):{resultados:{},predicciones:{}};
      state=mergeStates(local, d.record);
      localStorage.setItem('q26bk',JSON.stringify(state));
    }
  }catch(e){
    const bk=localStorage.getItem('q26bk');
    if(bk) state=JSON.parse(bk);
  }
}
// Mezcla dos estados para no perder datos de nadie
function mergeStates(local, cloud){
  const merged={
    resultados:{...(cloud.resultados||{}),...(local.resultados||{})},
    predicciones:{}
  };
  const pids=new Set([
    ...Object.keys(cloud.predicciones||{}),
    ...Object.keys(local.predicciones||{})
  ]);
  for(const pid of pids){
    merged.predicciones[pid]={
      ...(cloud.predicciones[pid]||{}),
      ...(local.predicciones[pid]||{})
    };
  }
  return merged;
}

async function saveState(){
  // 1. Guardar local siempre (instantaneo, sin importar nada)
  localStorage.setItem('q26bk',JSON.stringify(state));

  // 2. Si ya hay un guardado en curso, marcar que hay cambios pendientes y salir
  if(saving){ pendingSave=true; return; }
  saving=true; pendingSave=false;
  setSyncBadge('saving','Guardando...');

  try{
    // 3. Leer estado actual de la nube
    const rGet=await Promise.race([
      fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY}}),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),5000))
    ]);
    const cloudData=await rGet.json();
    const cloudState=(cloudData&&cloudData.record)||{resultados:{},predicciones:{}};

    // 4. Mezclar: nube + cambios locales (nadie pierde sus datos)
    const merged=mergeStates(state, cloudState);
    state=merged;
    localStorage.setItem('q26bk',JSON.stringify(state));

    // 5. Guardar el estado mezclado en la nube
    const rPut=await Promise.race([
      fetch(BIN_URL,{method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
        body:JSON.stringify(merged)}),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),7000))
    ]);

    if(rPut.ok){
      setSyncBadge('saved','Guardado');
      setTimeout(()=>setSyncBadge('','Live'),2000);
    } else {
      setSyncBadge('error','Reintentando...');
      setTimeout(()=>setSyncBadge('','Live'),3000);
    }
  }catch(e){

  }

function shortTeam(n){return n.normalize('NFD').replace(/[\u0300-\u036f]/g,'').split(' ')[0].slice(0,4);}

function calcMatchPoints(pid,player,p){
  if(!p||p.fase!=='elim') return null;
  const res=state.resultados[pid];if(!res) return null;
  const pred=(state.predicciones[pid]||{})[player];if(!pred) return null;
  const [rg1,rg2]=res,rPen=res[2],[pg1,pg2]=pred,pPen=pred[2];
  const rDiff=rg1-rg2,pDiff=pg1-pg2;
  const rWin=rDiff>0?'e1':rDiff<0?'e2':'draw';
  const pWin=pDiff>0?'e1':pDiff<0?'e2':'draw';
  if(pWin!==rWin) return 0;
  let pts=1;
  if(pDiff===rDiff) pts=(pg1===rg1&&pg2===rg2)?5:3;
  if(rWin==='draw'&&rPen&&pPen===rPen) pts+=1;
  return pts;
}

function calcPuntos(){
  const tot={};J.forEach(j=>tot[j]=0);
  for(const p of PARTIDOS){
    if(p.fase!=='elim') continue;
    const res=state.resultados[p.id];if(!res) continue;
    for(const player of matchPlayers(p)){
      const pts=calcMatchPoints(p.id,player,p);
      if(pts!==null) tot[player]+=pts;
    }
  }
  return tot;
}

function calcFondos(){
  let acum=0;
  const fondo={},ganadores={},ganancias={},pagos={};
  J.forEach(j=>ganancias[j]=0);

  // Solo fase de grupos maneja dinero/bolsa; eliminatorias usa solo puntos
  const GRUPO_PARTIDOS=PARTIDOS.filter(p=>!p.fase);

  // Agrupar partidos por fecha+hora para detectar simultáneos
  let i=0;
  while(i<GRUPO_PARTIDOS.length){
    const p=GRUPO_PARTIDOS[i];
    let jj=i+1;
    while(jj<GRUPO_PARTIDOS.length && GRUPO_PARTIDOS[jj].d===p.d && GRUPO_PARTIDOS[jj].h===p.h) jj++;
    const rawSlot=GRUPO_PARTIDOS.slice(i,jj);
    i=jj;

    // Solo partidos con predicciones
    const slot=rawSlot.filter(m=>Object.keys(state.predicciones[m.id]||{}).length>0);
    if(!slot.length) continue;

    const totalBase=slot.reduce((s,m)=>s+matchBase(m),0);
    const combinedPot=acum+totalBase;

    if(slot.length===1){
      // ── Partido único ──
      const m=slot[0];
      const base=matchBase(m);
      const pot=acum+base;
      fondo[m.id]=pot;
      const res=state.resultados[m.id];
      if(res){
        const preds=state.predicciones[m.id]||{};
        const wins=matchPlayers(m).filter(j=>{const pr=preds[j];return pr&&pr[0]===res[0]&&pr[1]===res[1];});
        ganadores[m.id]=wins;
        if(wins.length){
          const e=pot/wins.length;pagos[m.id]=e;
          wins.forEach(j=>ganancias[j]+=e);acum=0;
        }else acum=pot;
      }else{ganadores[m.id]=[];}
    } else {
      // ── Partidos simultáneos ──
      // Mostrar la bolsa combinada en todos
      slot.forEach(m=>{fondo[m.id]=combinedPot;ganadores[m.id]=[];});

      const allHaveResult=slot.every(m=>state.resultados[m.id]);

      if(!allHaveResult){
        // Aún hay resultados pendientes: no distribuir todavía
        // acum no cambia hasta tener todos los resultados
      } else {
        // Todos tienen resultado: aplicar lógica de simultáneos
        const matchWins=slot.map(m=>{
          const preds=state.predicciones[m.id]||{};
          const res=state.resultados[m.id];
          return matchPlayers(m).filter(j=>{const pr=preds[j];return pr&&pr[0]===res[0]&&pr[1]===res[1];});
        });
        slot.forEach((m,idx)=>ganadores[m.id]=matchWins[idx]);

        const wonIdx=matchWins.map((w,idx)=>w.length>0?idx:-1).filter(x=>x>=0);

        if(wonIdx.length===0){
          // Nadie gana: todo acumula
          acum=combinedPot;

        } else if(wonIdx.length>1){
          // Varios partidos tienen ganadores: SE SUMA TODO y se reparte
          const allWinnersSet=new Set();
          wonIdx.forEach(idx=>matchWins[idx].forEach(w=>allWinnersSet.add(w)));
          const allWinners=[...allWinnersSet];
          const perWinner=combinedPot/allWinners.length;
          allWinners.forEach(j=>ganancias[j]+=perWinner);
          slot.forEach(m=>pagos[m.id]=perWinner);
          acum=0;

        } else {
          // Solo un partido tiene ganadores
          const firstIdx=wonIdx[0];

          // El ganador se lleva: acum + bases de partidos hasta el primero que ganó
          let winPot=acum;
          for(let k=0;k<=firstIdx;k++) winPot+=matchBase(slot[k]);

          // Partidos después del ganador que no tuvieron ganador: acumulan
          let newAccum=0;
          for(let k=firstIdx+1;k<slot.length;k++) newAccum+=matchBase(slot[k]);

          const winners=matchWins[firstIdx];
          const per=winPot/winners.length;
          winners.forEach(j=>ganancias[j]+=per);
          pagos[slot[firstIdx].id]=per;
          acum=newAccum;
        }
      }
    }
  }
  return{fondo,ganadores,acumulado:acum,ganancias,pagos};
}

const DS=['dom','lun','mar','mie','jue','vie','sab'],MS=['ene','feb','mar','abr','may','jun','jul'];
function fmtD(d){const dt=new Date(d+'T12:00:00');return DS[dt.getDay()]+' '+dt.getDate()+' '+MS[dt.getMonth()];}

function matchStarted(p){
  const now=new Date();
  const kickoff=new Date(p.d+'T'+p.h+':00');
  return now>=kickoff;
}

function canEnterResult(p){
  // Solo se puede ingresar resultado 15 minutos después del inicio
  const now=new Date();
  const kickoff=new Date(p.d+'T'+p.h+':00');
  return now>=new Date(kickoff.getTime()+15*60*1000);
}

      <button class="se-ok" onclick="saveScore(${pid})">&#10003; Guardar</button>

      <button class="se-x" onclick="cancelScore()">&#10005;</button>
    </div></div>`;
  }else if(res){

    scoreHtml=`<div style="text-align:center">
      <div class="score-nums" style="cursor:pointer" onclick="startScoreEdit(${pid})">${res[0]}<span class="score-dash">&#8212;</span>${res[1]}</div>
      <div class="final-txt">${penTxt}</div>

          chipsHtml+=`<div class="chip${won?' win':' locked'}" style="cursor:default">

          <div class="chip-name">${SHORT[j]}</div>

  let list='<div class="rank-list">';
  sorted.slice(3).forEach((j,i)=>{
    const q=ganancias[j],ac=aciertos[j];
    list+=`<div class="rank-row"><div class="rk-pos">${i+4}</div>${avatar(j,40)}<div class="rk-name">${j}</div><div class="rk-stats"><div class="rk-ac">${ac} acierto${ac!==1?'s':''}</div><div class="rk-q">Q${q%1===0?q:q.toFixed(2)}</div></div></div>`;
  });
  list+='</div>';
  document.getElementById('view-ranking').innerHTML=`
    <div class="rank-banner">
      <div><h2>RANKING</h2><p>Bolsa acumulada: Q${acumulado} | Mundial 2026</p></div>
    </div>${pod}${list}`;
}

function updateBolsa(){
  const{fondo,acumulado}=calcFondos();
  const next=PARTIDOS.find(p=>!p.fase&&!state.resultados[p.id]&&Object.keys(state.predicciones[p.id]||{}).length>0);
  const pot=next?(fondo[next.id]||0):acumulado;
  document.getElementById('bolsaNum').textContent='Q'+pot;
  document.getElementById('bolsaSub').innerHTML=next&&pot>0?`Pr&oacute;ximo:<br>${next.e1} vs ${next.e2}`:'';
}

function showTab(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('view-'+name).classList.add('on');btn.classList.add('on');
  if(name==='ranking')renderRanking();
  if(name==='puntuacion')renderPuntuacion();
  if(name==='cuadro'){document.getElementById('view-cuadro').innerHTML='<div class="bracket-outer">'+renderBracket()+'</div>';}
}

function scrollToNext(){
  if(!document.getElementById('view-partidos').classList.contains('on'))
    showTab('partidos',document.querySelectorAll('.tab')[0]);
  const next=PARTIDOS.find(p=>!state.resultados[p.id]&&Object.keys(state.predicciones[p.id]||{}).length>0)
           ||PARTIDOS.find(p=>!state.resultados[p.id]);
  if(!next)return;
  const phaseMap={'R32':'r32','R16':'r16','Cuartos':'qf','Semis':'sf','FINAL':'final','3er Lugar':'final'};
  const phaseId=next.fase==='elim'?(phaseMap[next.g]||'r32'):'grupos';
  const ptabs=document.querySelectorAll('.ptab');
  const ids=['grupos','r32','r16','qf','sf','final'];
  showPhase(phaseId, ptabs[ids.indexOf(phaseId)]);
  setTimeout(()=>{
    const el=document.getElementById('mc-'+next.id);
    if(el){
      window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-200,behavior:'smooth'});
      el.style.transition='box-shadow .2s';
      el.style.boxShadow='0 0 0 3px var(--gold),0 4px 20px rgba(245,158,11,.4)';
      setTimeout(()=>{el.style.boxShadow='';},1400);
    }
  },100);
}


// ─── BRACKET ───
const BRACKET_PARENTS={
  89:[73,76], 90:[75,78], 91:[77,74], 92:[79,80],
  93:[82,81], 94:[83,84], 95:[85,88], 96:[86,87],
  97:[89,90], 98:[91,92], 99:[93,94], 100:[95,96],
  101:[97,98], 102:[99,100], 104:[101,102],
};
// Loser tracking for 3rd place
function getLoser(id){
  const res=state.resultados[id];if(!res)return null;
  const [t1,t2]=getBTeams(id);
  if(res[0]>res[1])return t2;if(res[1]>res[0])return t1;return null;
}
function getBTeams(id){
  const pars=BRACKET_PARENTS[id];
  if(!pars){const p=PARTIDOS.find(x=>x.id===id);return p?[p.e1,p.e2]:['?','?'];}
  return pars.map(pid=>getBWinner(pid)||'–');
}
function getBWinner(id){
  const res=state.resultados[id];if(!res)return null;
  const [t1,t2]=getBTeams(id);
  if(res[0]>res[1])return t1;if(res[1]>res[0])return t2;return null;
}
function bCard(id,isFinal=false){
  const [t1,t2]=getBTeams(id);
  const w=getBWinner(id);
  const res=state.resultados[id];
  const u1=flagUrl(t1),u2=flagUrl(t2);
  const row=(t,u,s,isW)=>{
    const tbd=t==='–';
    return `<div class="bmt${isW?' bmt-w':''}${tbd?' bm-tbd':''}">
      ${u?`<img src="${u}" class="bm-flag">`:`<span class="bm-flag-ph"></span>`}
      <span class="bm-name">${tbd?'Por def.':t}</span>
      ${s!==undefined?`<span class="bm-score">${s}</span>`:''}
    </div>`;
  };
  return `<div class="bm${isFinal?' bm-final':''}">
    ${row(t1,u1,res?res[0]:undefined,w===t1&&w!==null&&w!=='–')}
    ${row(t2,u2,res?res[1]:undefined,w===t2&&w!==null&&w!=='–')}
  </div>`;
}
function connCol(n){
  // Creates a connector column with n bracket pair connectors
  let html='<div class="br-conn">';
  for(let i=0;i<n;i++) html+=`<div class="br-conn-grp"><div class="br-conn-top"></div><div class="br-conn-bot"></div></div>`;
  return html+'</div>';
}
function renderBracket(){
  // Header widths: r32=148, conn=20, r16=148, conn=20, qf=148, conn=20, sf=148, conn=20, final=148
  const colW=148,connW=20;
  const total=(colW+connW)*4+colW;
  const rnd=(label,w)=>`<div class="bracket-hdr" style="width:${w}px">${label}</div>`;
  
  // TOP HALF: R32[73,76,75,78,77,74,79,80] → R16[89,90,91,92] → QF[97,98] → SF[101]
  // BOTTOM HALF: R32[82,81,83,84,85,88,86,87] → R16[93,94,95,96] → QF[99,100] → SF[102]
  // FINAL: 104  3RD: 103 (SF losers)
  
  const r32top=[73,76,75,78,77,74,79,80];
  const r32bot=[82,81,83,84,85,88,86,87];
  const r16top=[89,90,91,92];
  const r16bot=[93,94,95,96];
  
  // Column renderers
  const col=(ids,cls,spacer=false)=>{
    return `<div class="br-col ${cls}">${ids.map((id,i)=>
      (spacer&&i===ids.length/2)?`<div class="br-half-div"></div>${bCard(id)}`:bCard(id)
    ).join('')}</div>`;
  };
  
  const sfHtml=`<div class="br-col br-col-sf" style="justify-content:space-around">
    ${bCard(101)}
    <div style="height:${colW/2}px"></div>
    ${bCard(102)}
  </div>`;
  
  const finalHtml=`<div class="br-col br-col-final" style="justify-content:center;gap:12px">
    <div class="br-3rd-label">3er Lugar</div>
    ${(()=>{
      const l1=getLoser(101)||'–';
      const l2=getLoser(102)||'–';
      const res=state.resultados[103];
      const u1=flagUrl(l1),u2=flagUrl(l2);
      const row=(t,u,s)=>`<div class="bmt ${res&&res[0]>res[1]&&t===l1?' bmt-w':res&&res[1]>res[0]&&t===l2?' bmt-w':''}">
        ${u?`<img src="${u}" class="bm-flag">`:`<span class="bm-flag-ph"></span>`}
        <span class="bm-name">${t==='–'?'Por def.':t}</span>
        ${s!==undefined?`<span class="bm-score">${s}</span>`:''}
      </div>`;
      return `<div class="bm">${row(l1,u1,res?res[0]:undefined)}${row(l2,u2,res?res[1]:undefined)}</div>`;
    })()}
    <div class="br-3rd-label" style="margin-top:8px">Final</div>
    ${bCard(104,true)}
  </div>`;
  
  return `
    <div class="bracket-hdrs" style="min-width:${total}px;margin-bottom:4px">
      ${rnd('16avos',colW)}${rnd('',connW)}${rnd('8avos',colW)}${rnd('',connW)}
      ${rnd('4tos',colW)}${rnd('',connW)}${rnd('Semis',colW)}${rnd('',connW)}${rnd('Final',colW)}
    </div>
    <div class="bracket-body" style="min-width:${total}px">
      <!-- R32: top then bottom with mid gap -->
      <div class="br-col br-col-r32" style="gap:4px">
        ${r32top.map((id,i)=>`${i>0&&i%2===0?'<div style="height:12px"></div>':''}<div>${bCard(id)}</div>`).join('')}
        <div style="height:16px"></div>
        ${r32bot.map((id,i)=>`${i>0&&i%2===0?'<div style="height:12px"></div>':''}<div>${bCard(id)}</div>`).join('')}
      </div>
      ${connCol(8)}
      <!-- R16 -->
      <div class="br-col br-col-r16" style="gap:4px">
        ${r16top.map(id=>`<div>${bCard(id)}</div>`).join('')}
        <div style="height:16px"></div>
        ${r16bot.map(id=>`<div>${bCard(id)}</div>`).join('')}
      </div>
      ${connCol(4)}
      <!-- QF -->
      <div class="br-col br-col-qf" style="gap:4px">
        <div>${bCard(97)}</div>
        <div>${bCard(98)}</div>
        <div style="height:16px"></div>
        <div>${bCard(99)}</div>
        <div>${bCard(100)}</div>
      </div>
      ${connCol(2)}
      <!-- SF -->
      ${sfHtml}
      ${connCol(1)}
      <!-- Final + 3rd -->
      ${finalHtml}
    </div>`;
}


function renderPuntuacion(){
  const tots=calcPuntos();
  // Only show players who participate in elimination (all 10: J includes JENNY)
  const elimPlayers=J; // all players since JENNY joins from R32
  const aciertos={};
  const byType={'5':{},'3':{},'1':{},'0':{}};
  elimPlayers.forEach(j=>{aciertos[j]=0;Object.keys(byType).forEach(k=>byType[k][j]=0);});
  for(const p of PARTIDOS){
    if(p.fase!=='elim') continue;
    const res=state.resultados[p.id];if(!res) continue;
    for(const player of matchPlayers(p)){
      const pts=calcMatchPoints(p.id,player,p);
      if(pts===null) continue;
      aciertos[player]++;
      const k=pts>=5?'5':pts>=3?'3':pts>=1?'1':'0';
      byType[k][player]=(byType[k][player]||0)+1;
    }
  }
  const sorted=[...elimPlayers].sort((a,b)=>tots[b]-tots[a]||aciertos[b]-aciertos[a]);
  const bdrs=['#a5b4fc','#aaaaaa','#b45309'];
  let pod='<div class="podium">';
  sorted.slice(0,3).forEach((j,i)=>{
    const pt=tots[j],ac=aciertos[j];
    const purl=PHOTOS[j];
    const ini=j.split(' ').map(w=>w[0]).join('').slice(0,2);
    const pbg=['#1d4ed8','#7c3aed','#be185d','#0f766e','#b45309','#15803d','#c2410c','#0369a1','#0e7490','#7e1d1d'][J.indexOf(j)%10];
    const pimg=purl
      ?`<img src="${purl}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid ${bdrs[i]};display:block;margin:0 auto 4px">`
      :`<div style="width:72px;height:72px;border-radius:50%;background:${pbg};border:3px solid ${bdrs[i]};display:flex;align-items:center;justify-content:center;margin:0 auto 4px;font-family:var(--sport);font-size:20px;color:#fff">${ini}</div>`;
    pod+=`<div class="pod p${i+1}">
      <div style="position:relative;display:inline-block">${pimg}<div style="position:absolute;bottom:-4px;right:-4px;background:${bdrs[i]};color:#000;width:22px;height:22px;border-radius:50%;font-family:var(--sport);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)">${i+1}</div></div>
      <div class="pod-name">${j}</div><div class="rk-q-pts">${pt}pts</div>
      <div class="pod-ac">${ac} partido${ac!==1?'s':''}</div><div class="pod-base"></div>
    </div>`;
  });
  pod+='</div>';
  let list='<div class="rank-list">';
  sorted.slice(3).forEach((j,i)=>{
    const pt=tots[j],ac=aciertos[j];
    const d5=byType['5'][j]||0,d3=byType['3'][j]||0,d1=byType['1'][j]||0;
    list+=`<div class="rank-row"><div class="rk-pos" style="color:#a5b4fc">${i+4}</div>${avatar(j,40)}<div class="rk-name">${j}</div>
      <div class="rk-stats">
        <div class="rk-ac" style="font-size:9px">${d5?'5pts×'+d5+' ':''}${d3?'3pts×'+d3+' ':''}${d1?'1pt×'+d1:''}</div>
        <div class="rk-q-pts">${pt}pts</div>
      </div></div>`;
  });
  list+='</div>';
  document.getElementById('view-puntuacion').innerHTML=`
    <div class="pts-bnr"><div><h2>PUNTUACIÓN</h2><p>Fase eliminatoria · Mundial 2026</p></div></div>
    ${pod}${list}`;
}
function renderAll(){renderPartidos();updateBolsa();if(document.getElementById('view-ranking').classList.contains('on'))renderRanking();
  if(document.getElementById('view-puntuacion').classList.contains('on'))renderPuntuacion();}

async function init(){
  try{ await loadState(); }
  catch(e){ console.error('Init error:',e); }
  finally{
    document.getElementById('loadingScreen').classList.add('hidden');
    renderAll();
  }
  setInterval(async()=>{
    try{ await loadState(); if(!editScore&&!editChip)renderAll(); }
    catch(e){ console.error('Refresh error:',e); }
  },60000);
}
init();
</script>
