<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --g1:#012515;--g2:#064e3b;--g3:#065f46;--gm:#15803d;--gl:#dcfce7;
  --gold:#f59e0b;--gold2:#d97706;--goldl:#fef3c7;--goldd:#92400e;
  --red:#dc2626;--redl:#fee2e2;
  --bg:#eef1ed;--card:#fff;--brd:#dde3db;
  --t1:#111827;--t2:#374151;--t3:#6b7280;--t4:#b0bba8;
  --ui:'Inter',system-ui,sans-serif;--sport:'Oswald',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--ui);background:var(--bg);color:var(--t1);min-height:100vh}
button{border:none;cursor:pointer;font-family:var(--ui)}
button:active{transform:scale(.96)}
input{font-family:var(--ui)}

/* LOADING */
.loading-screen{
  position:fixed;inset:0;background:linear-gradient(160deg,#012515,#064e3b);
  z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  color:#fff;transition:opacity .4s;
}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-ball{font-size:52px;animation:spin 1.2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.loading-txt{font-family:var(--sport);font-size:18px;letter-spacing:2px;opacity:.8}
.loading-sub{font-size:12px;opacity:.5;letter-spacing:1px}

/* HEADER */
.hdr{
  background:linear-gradient(150deg,#012515 0%,#064e3b 55%,#15803d 100%);
  padding:12px 16px 10px;position:sticky;top:0;z-index:300;
  box-shadow:0 3px 16px rgba(0,0,0,.45);overflow:hidden;
}
.hdr::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,.03) 28px,rgba(255,255,255,.03) 56px);
  pointer-events:none;
}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-ball{font-size:26px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.hdr h1{font-family:var(--sport);font-size:20px;color:#fff;letter-spacing:2px;text-shadow:0 2px 6px rgba(0,0,0,.3)}
.hdr p{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:3px;margin-top:2px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.btn-next{
  padding:7px 13px;border-radius:20px;
  background:rgba(255,255,255,.15);color:#fff;
  font-size:12px;font-weight:800;letter-spacing:.3px;
  border:1.5px solid rgba(255,255,255,.3);
  transition:all .2s;white-space:nowrap;
}
.btn-next:hover{background:rgba(255,255,255,.25)}
.btn-next:active{transform:scale(.95);background:rgba(255,255,255,.3)}
.sync-badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);
  letter-spacing:.3px;text-align:center;transition:all .3s;
}
.sync-badge.saving{background:rgba(245,158,11,.25);color:var(--gold)}
.sync-badge.saved{background:rgba(74,222,128,.2);color:#4ade80}
.sync-badge.error{background:rgba(248,113,113,.2);color:#f87171}

/* BOLSA */
.bolsa{
  background:linear-gradient(135deg,var(--goldd),#b45309);
  padding:10px 18px;display:flex;align-items:center;gap:12px;
  position:sticky;top:50px;z-index:299;box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.bolsa-icon{font-size:22px}
.bolsa-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.7)}
.bolsa-num{font-family:var(--sport);font-size:28px;color:#fff;letter-spacing:2px;text-shadow:0 2px 6px rgba(0,0,0,.3);line-height:1}
.bolsa-sub{margin-left:auto;font-size:10px;color:rgba(255,255,255,.6);text-align:right;line-height:1.4}

/* TABS */
.tabs{background:#fff;border-bottom:2px solid var(--brd);display:flex;position:sticky;top:98px;z-index:298}
.tab{flex:1;padding:12px 10px;font-size:13px;font-weight:800;letter-spacing:.5px;
  color:var(--t3);background:transparent;border-bottom:3px solid transparent;text-transform:uppercase}
.tab.on{color:var(--gm);border-bottom-color:var(--gm)}

/* VIEWS */
.view{display:none;padding:14px 14px 90px}
.view.on{display:block}

/* DAY */
.day-div{display:flex;align-items:center;gap:10px;margin:20px 0 10px}
.day-div:first-child{margin-top:6px}
.day-line{flex:1;height:1px;background:var(--brd)}
.day-txt{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);white-space:nowrap}

/* MATCH CARD */
.mc{background:var(--card);border-radius:16px;border:1px solid var(--brd);
  margin-bottom:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);transition:box-shadow .2s}
.mc.editing{box-shadow:0 0 0 2px var(--gm),0 4px 16px rgba(0,0,0,.1)}
.mc-bar{display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--brd)}
.badge{padding:3px 11px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.bg-grupo{background:var(--gl);color:var(--g2)}
.bg-r32{background:#dbeafe;color:#1d4ed8}
.bg-r16{background:#ede9fe;color:#5b21b6}
.bg-qf{background:#ffedd5;color:#9a3412}
.bg-final{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.mc-time{font-size:12px;font-weight:600;color:var(--t3)}

/* MATCH BODY */
.mc-body{padding:16px 14px 14px}
.match-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
/* FLAG IMAGES */
.team {
  flex: 1; text-align: center; position: relative;
  border-radius: 12px; overflow: hidden; padding: 10px 6px;
}
.team-flag-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0.13; filter: blur(3px); transform: scale(1.15);
  pointer-events: none;
}
.team-flag-img {
  width: 54px; height: 36px; object-fit: cover;
  border-radius: 4px; box-shadow: 0 2px 10px rgba(0,0,0,.25);
  margin: 0 auto 7px; display: block; position: relative; z-index: 1;
}
.team-name {
  font-family: var(--sport); font-size: 13px; color: var(--t1);
  letter-spacing: .5px; line-height: 1.2;
  position: relative; z-index: 1;
}


/* SCORE BOX */
.score-box{
  flex-shrink:0;text-align:center;min-width:90px;
  cursor:pointer;padding:6px;border-radius:12px;transition:background .15s;
}
.score-box:hover{background:rgba(21,128,61,.06)}
.score-box:active{background:rgba(21,128,61,.12)}
.score-nums{font-family:var(--sport);font-size:42px;font-weight:700;
  color:var(--g2);letter-spacing:6px;line-height:1;
  display:flex;align-items:center;justify-content:center;gap:2px}
.score-dash{font-size:30px;color:var(--t4);margin:0 2px}
.vs-txt{font-family:var(--sport);font-size:22px;color:var(--t4);letter-spacing:3px;line-height:1}
.score-hint{font-size:10px;color:var(--t4);margin-top:5px;font-weight:600;letter-spacing:.5px}

/* SCORE EDIT */
.score-edit{display:flex;flex-direction:column;align-items:center;gap:8px;padding:4px 0}
.se-row{display:flex;align-items:center;gap:6px}
.sei{width:52px;padding:4px 2px;border:2.5px solid var(--gm);border-radius:10px;
  font-family:var(--sport);font-size:34px;font-weight:700;text-align:center;color:var(--g2);background:#fff}
.sei:focus{outline:none;border-color:var(--gold)}
.sei-dash{font-family:var(--sport);font-size:28px;color:var(--t4)}
.se-btns{display:flex;gap:6px}
.se-ok{padding:6px 14px;background:var(--gm);color:#fff;border-radius:8px;font-size:13px;font-weight:800}
.se-del{padding:6px 10px;background:var(--redl);color:var(--red);border-radius:8px;font-size:13px;font-weight:800}
.se-x{padding:6px 10px;background:var(--bg);color:var(--t3);border-radius:8px;font-size:13px;font-weight:800;border:1.5px solid var(--brd)}

.chips-wrap{border-top:1px solid var(--brd);overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:10px 12px 12px;display:flex;gap:8px;align-items:stretch}
.chips-wrap::-webkit-scrollbar{height:3px}
.chips-wrap::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
.chip{flex-shrink:0;cursor:pointer;background:var(--bg);border:1.5px solid var(--brd);
  border-radius:11px;padding:7px 11px;min-width:72px;text-align:center;transition:all .15s}
.chip:hover{border-color:var(--gm);background:#f0fdf4}
.chip:active{transform:scale(.95)}
.chip.win{background:linear-gradient(160deg,#fef3c7,#fde68a);border-color:var(--gold);box-shadow:0 3px 8px rgba(245,158,11,.3)}
.chip.no-pred{opacity:.35}
.chip.chip-editing{min-width:106px;border-color:var(--gm);background:#f0fdf4;box-shadow:0 0 0 2px rgba(21,128,61,.2);cursor:default}
.chip-name{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:5px;white-space:nowrap}
.win .chip-name{color:var(--goldd)}
.chip-score{font-family:var(--sport);font-size:17px;color:var(--t1);letter-spacing:1px}
.win .chip-score{color:var(--g2)}
.chip-crown{font-size:11px;display:block;margin-top:2px}
.chip-edit-hint{font-size:8px;color:var(--t4);margin-top:3px;letter-spacing:.3px}
.chip-edit-row{display:flex;align-items:center;gap:3px;margin-top:4px;justify-content:center}
.cie{width:28px;padding:2px 1px;border:1.5px solid var(--gm);border-radius:5px;

.cie-sep{font-family:var(--sport);font-size:13px;color:var(--t4)}
.cie-ok{padding:3px 7px;background:var(--gm);color:#fff;border-radius:5px;font-size:12px;font-weight:800;margin-left:2px}
.cie-del{padding:3px 5px;background:var(--redl);color:var(--red);border-radius:5px;font-size:12px;font-weight:800;margin-left:1px}
.no-preds{padding:10px 14px;font-size:12px;color:var(--t4);border-top:1px solid var(--brd);font-style:italic}
.winner-bar{padding:7px 14px;background:var(--gl);border-top:1px solid #a7f3d0;font-size:12px;font-weight:700;color:var(--g2)}

  padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 14px rgba(0,0,0,.2)}
.rank-banner h2{font-family:var(--sport);font-size:20px;color:#fff;letter-spacing:2px}
.rank-banner p{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:20px}
.pod{flex:1;max-width:110px;text-align:center}
.pod.p1{order:2}.pod.p2{order:1}.pod.p3{order:3}
.pod-emoji{font-size:30px;margin-bottom:5px}
.pod-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--t1);line-height:1.2;margin-bottom:5px}
.pod-q{font-family:var(--sport);font-size:20px;color:var(--g2);margin-bottom:3px}
.pod-ac{font-size:10px;color:var(--t3)}
.pod-base{border-radius:8px 8px 0 0;padding:10px 4px;margin-top:6px;border:1.5px solid var(--brd)}
.p1 .pod-base{background:linear-gradient(180deg,#fef3c7,#fde68a);border-color:var(--gold);min-height:56px}
.p2 .pod-base{background:var(--bg);min-height:36px}
.p3 .pod-base{background:var(--bg);min-height:20px}
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-row{background:var(--card);border-radius:12px;border:1px solid var(--brd);
  padding:13px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}

.rk-name{flex:1;font-size:15px;font-weight:800;color:var(--t1)}
.rk-stats{text-align:right}
.rk-ac{font-size:11px;color:var(--t3);margin-bottom:2px}
.rk-q{font-family:var(--sport);font-size:21px;color:var(--g2)}

// ═══ STATE ═══
let state={resultados:{},predicciones:{}};
let editScore=null,editChip=null,saving=false;

// ═══ JSONBIN ═══
async function loadState(){
  try{
    const r=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    const d=await r.json();
    state=d.record;
  }catch(e){console.error('Load error:',e);}
}

async function saveState(){
  if(saving)return;
  saving=true;
  setSyncBadge('saving','&#128257; Guardando...');
  try{
    await fetch(BIN_URL,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify(state)
    });
    setSyncBadge('saved','&#10003; Guardado');
    setTimeout(()=>setSyncBadge('','&#128257; Live'),2500);
  }catch(e){
    setSyncBadge('error','&#9888; Error');
    setTimeout(()=>setSyncBadge('','&#128257; Live'),3000);
  }
  saving=false;
}

function setSyncBadge(cls,txt){
  const b=document.getElementById('syncBadge');
  b.className='sync-badge'+(cls?' '+cls:'');
  b.innerHTML=txt;
}

// ═══ FONDO ═══
function calcFondos(){
  let acum=0;const fondo={},ganadores={},ganancias={};
  J.forEach(j=>ganancias[j]=0);
  for(const p of PARTIDOS){
    const preds=state.predicciones[p.id]||{};
    if(!Object.keys(preds).length)continue;
    const base=p.fase==='elim'?40:8;
    const pot=acum+base;fondo[p.id]=pot;
    const res=state.resultados[p.id];
    if(res){
      const wins=J.filter(j=>{const pr=preds[j];return pr&&pr[0]===res[0]&&pr[1]===res[1];});
      ganadores[p.id]=wins;
      if(wins.length){const e=pot/wins.length;wins.forEach(j=>ganancias[j]+=e);acum=0;}
      else acum=pot;
    }
  }
  return{fondo,ganadores,acumulado:acum,ganancias};
}

// ═══ FORMAT ═══
const DS=['dom','lun','mar','mié','jue','vie','sáb'],MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function fmtD(d){const dt=new Date(d+'T12:00:00');return`${DS[dt.getDay()]} ${dt.getDate()} ${MS[dt.getMonth()]}`;}
function gBadge(g,fase){
  if(fase==='elim'){
    if(g==='FINAL')return`<span class="badge bg-final">${g}</span>`;
    if(g==='R32'||g==='R16')return`<span class="badge bg-r32">${g}</span>`;
    return`<span class="badge bg-qf">${g}</span>`;
  }
  return`<span class="badge bg-grupo">${g}</span>`;
}

// ═══ INLINE EDIT ═══
function startScoreEdit(pid){
  editScore=pid;editChip=null;renderPartidos();
  setTimeout(()=>{const el=document.getElementById('sl-'+pid);if(el){el.focus();el.select();}},60);
}
function saveScore(pid){
  const l=document.getElementById('sl-'+pid)?.value;
  const v=document.getElementById('sv-'+pid)?.value;
  if(l!==''&&v!==''&&l!=null&&v!=null)
    state.resultados[pid]=[parseInt(l),parseInt(v)];
  editScore=null;saveState();renderAll();
}
function delScore(pid){delete state.resultados[pid];editScore=null;saveState();renderAll();}
function cancelScore(){editScore=null;renderPartidos();}

function startChipEdit(pid,player){
  editChip={pid,player};editScore=null;renderPartidos();
  const key=player.replace(/ /g,'_');
  setTimeout(()=>{const el=document.getElementById('cl-'+pid+'-'+key);if(el){el.focus();el.select();}},60);
}
function saveChip(pid,player){
  const key=player.replace(/ /g,'_');
  const l=document.getElementById('cl-'+pid+'-'+key)?.value;
  const v=document.getElementById('cv-'+pid+'-'+key)?.value;
  if(l!==''&&v!==''&&l!=null&&v!=null){
    if(!state.predicciones[pid])state.predicciones[pid]={};
    state.predicciones[pid][player]=[parseInt(l),parseInt(v)];
  }
  editChip=null;saveState();renderAll();
}
function delChip(pid,player){
  if(state.predicciones[pid])delete state.predicciones[pid][player];
  editChip=null;saveState();renderAll();
}
function cancelChip(){editChip=null;renderPartidos();}
function onScoreKey(e,pid){if(e.key==='Enter')saveScore(pid);if(e.key==='Escape')cancelScore();}
function onChipKey(e,pid,player){if(e.key==='Enter')saveChip(pid,player);if(e.key==='Escape')cancelChip();}

// ═══ RENDER PARTIDOS ═══
function renderPartidos(){
  const{fondo,ganadores}=calcFondos();
  const sy=window.scrollY;
  const el=document.getElementById('view-partidos');
  let html='';let lastDay='';
  for(const p of PARTIDOS){
    if(p.d!==lastDay){
      html+=`<div class="day-div"><div class="day-line"></div><div class="day-txt">${fmtD(p.d)}</div><div class="day-line"></div></div>`;
      lastDay=p.d;
    }
    const res=state.resultados[p.id];
    const preds=state.predicciones[p.id]||{};
    const hasPreds=Object.keys(preds).length>0;
    const wins=ganadores[p.id]||[];
    const f=fondo[p.id];
    const pid=p.id;
    const isEditingScore=(editScore===pid);
    const isEditing=isEditingScore||(editChip&&editChip.pid===pid);
    const potBadge=(!res&&f)?`<span style="font-size:10px;font-weight:800;color:var(--goldd);background:var(--goldl);padding:2px 8px;border-radius:10px;border:1px solid var(--gold);margin-left:6px">&#128176; Q${f}</span>`:'';

    let scoreHtml;
    if(isEditingScore){
      const rv=res?res[0]:'',rr=res?res[1]:'';
      scoreHtml=`<div class="score-edit">
        <div class="se-row">
          <input id="sl-${pid}" class="sei" type="number" min="0" max="20" value="${rv}" placeholder="0" onkeydown="onScoreKey(event,${pid})">
          <span class="sei-dash">&#8212;</span>
          <input id="sv-${pid}" class="sei" type="number" min="0" max="20" value="${rr}" placeholder="0" onkeydown="onScoreKey(event,${pid})">
        </div>
        <div class="se-btns">
          <button class="se-ok" onclick="saveScore(${pid})">&#10003; Guardar</button>
          ${res?`<button class="se-del" onclick="delScore(${pid})">&#128465;</button>`:''}
          <button class="se-x" onclick="cancelScore()">&#10005;</button>
        </div>
      </div>`;
    }else if(res){
      scoreHtml=`<div class="score-box" onclick="startScoreEdit(${pid})">
        <div class="score-nums">${res[0]}<span class="score-dash">&#8212;</span>${res[1]}</div>
        <div class="score-hint">&#9999;&#65039; editar</div>
      </div>`;
    }else{
      scoreHtml=`<div class="score-box" onclick="startScoreEdit(${pid})">
        <div class="vs-txt">VS</div>
        <div class="score-hint">+ resultado</div>
      </div>`;
    }

    let chipsHtml='';
    if(hasPreds){
      chipsHtml='<div class="chips-wrap">';
      J.forEach(j=>{
        const pr=preds[j];
        const key=j.replace(/ /g,'_');
        const isEditingThis=editChip&&editChip.pid===pid&&editChip.player===j;
        const won=res&&pr&&pr[0]===res[0]&&pr[1]===res[1];
        if(isEditingThis){
          chipsHtml+=`<div class="chip chip-editing">
            <div class="chip-name">${SHORT[j]}</div>
            <div class="chip-edit-row">
              <input id="cl-${pid}-${key}" class="cie" type="number" min="0" max="20" value="${pr?pr[0]:''}" placeholder="0" onkeydown="onChipKey(event,${pid},'${j}')">
              <span class="cie-sep">-</span>
              <input id="cv-${pid}-${key}" class="cie" type="number" min="0" max="20" value="${pr?pr[1]:''}" placeholder="0" onkeydown="onChipKey(event,${pid},'${j}')">
              <button class="cie-ok" onclick="saveChip(${pid},'${j}')">&#10003;</button>
              ${pr?`<button class="cie-del" onclick="delChip(${pid},'${j}')">&#128465;</button>`:''}
            </div>
          </div>`;
        }else if(!pr){
          chipsHtml+=`<div class="chip no-pred" onclick="startChipEdit(${pid},'${j}')">
            <div class="chip-name">${SHORT[j]}</div>
            <div class="chip-score">&#8212;</div>
            <div class="chip-edit-hint">+ pred</div>
          </div>`;
        }else{
          chipsHtml+=`<div class="chip${won?' win':''}" onclick="startChipEdit(${pid},'${j}')">
            <div class="chip-name">${SHORT[j]}</div>
            <div class="chip-score">${pr[0]}-${pr[1]}</div>
            ${won?`<div class="chip-crown">&#11088;</div>`:`<div class="chip-edit-hint">&#9999;&#65039;</div>`}
          </div>`;
        }
      });
      chipsHtml+='</div>';
    }else{
      chipsHtml=`<div class="no-preds">Sin predicciones &#8212; toca una ficha para agregar</div>`;
    }
    const winBar=wins.length?`<div class="winner-bar">&#127942; Gan&#243;: <strong>${wins.join(', ')}</strong></div>`:'';

    html+=`<div id="mc-${pid}" class="mc${isEditing?' editing':''}">
      <div class="mc-bar">
        <div style="display:flex;align-items:center">${gBadge(p.g,p.fase)}${potBadge}</div>
        <div class="mc-time">${p.h}</div>
      </div>
      <div class="mc-body">
        <div class="match-row">
          ${teamBlock(p.e1)}
          <div>${scoreHtml}</div>
          ${teamBlock(p.e2)}
        </div>
      </div>
      ${chipsHtml}${winBar}
    </div>`;
  }
  el.innerHTML=html;
  window.scrollTo(0,sy);
}

// ═══ RENDER RANKING ═══
function renderRanking(){
  const{ganancias,acumulado}=calcFondos();
  const aciertos={};J.forEach(j=>aciertos[j]=0);
  for(const[pid,res]of Object.entries(state.resultados)){
    const preds=state.predicciones[pid]||{};
    J.forEach(j=>{const pr=preds[j];if(pr&&pr[0]===res[0]&&pr[1]===res[1])aciertos[j]++;});
  }
  const sorted=[...J].sort((a,b)=>ganancias[b]-ganancias[a]||aciertos[b]-aciertos[a]);
  const medals=['&#129351;','&#129352;','&#129353;'];
  let pod='<div class="podium">';
  sorted.slice(0,3).forEach((j,i)=>{
    const q=ganancias[j],ac=aciertos[j];
    pod+=`<div class="pod p${i+1}"><div class="pod-emoji">${medals[i]}</div>
      <div class="pod-name">${j}</div><div class="pod-q">Q${q%1===0?q:q.toFixed(2)}</div>
      <div class="pod-ac">${ac} acierto${ac!==1?'s':''}</div><div class="pod-base"></div></div>`;
  });
  pod+='</div>';
  let list='<div class="rank-list">';
  sorted.slice(3).forEach((j,i)=>{
    const q=ganancias[j],ac=aciertos[j];
    list+=`<div class="rank-row"><div class="rk-pos">${i+4}</div><div class="rk-name">${j}</div>
      <div class="rk-stats"><div class="rk-ac">${ac} acierto${ac!==1?'s':''}</div>
      <div class="rk-q">Q${q%1===0?q:q.toFixed(2)}</div></div></div>`;
  });
  list+='</div>';
  document.getElementById('view-ranking').innerHTML=`
    <div class="rank-banner"><div style="font-size:36px">&#127942;</div>
      <div><h2>RANKING</h2><p>Bolsa acumulada: Q${acumulado} &nbsp;|&nbsp; Mundial 2026</p></div>
    </div>${pod}${list}`;
}

// ═══ BOLSA ═══
function updateBolsa(){
  const{fondo,acumulado}=calcFondos();
  const next=PARTIDOS.find(p=>!state.resultados[p.id]&&Object.keys(state.predicciones[p.id]||{}).length>0);
  const pot=next?(fondo[next.id]||0):acumulado;
  document.getElementById('bolsaNum').textContent='Q'+pot;
  document.getElementById('bolsaSub').innerHTML=next&&pot>0?`Pr&#243;ximo:<br>${next.e1} vs ${next.e2}`:'';
}

// ═══ NAV ═══
function showTab(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('view-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='ranking')renderRanking();
}
function renderAll(){
  renderPartidos();updateBolsa();
  if(document.getElementById('view-ranking').classList.contains('on'))renderRanking();
}

// ═══ SCROLL TO NEXT ═══
function scrollToNext(){
  // Switch to partidos tab if needed
  if(!document.getElementById('view-partidos').classList.contains('on')){
    const btn=document.querySelectorAll('.tab')[0];
    showTab('partidos',btn);
  }
  // Find first match without result (skip ones with no predictions for cleaner UX)
  const next = PARTIDOS.find(p => !state.resultados[p.id] && Object.keys(state.predicciones[p.id]||{}).length > 0)
             || PARTIDOS.find(p => !state.resultados[p.id]);
  if(!next) return;
  setTimeout(()=>{
    const el=document.getElementById('mc-'+next.id);
    if(el){
      const top=el.getBoundingClientRect().top+window.scrollY-160; // offset for sticky header
      window.scrollTo({top,behavior:'smooth'});
      // Brief highlight flash
      el.style.transition='box-shadow .2s';
      el.style.boxShadow='0 0 0 3px var(--gold),0 4px 20px rgba(245,158,11,.4)';
      setTimeout(()=>{ el.style.boxShadow=''; },1400);
    }
  },80);
}

// ═══ INIT ═══
async function init(){
  await loadState();
  document.getElementById('loadingScreen').classList.add('hidden');
  renderAll();
  // Auto-refresh cada 60 segundos
  setInterval(async()=>{
    await loadState();
    if(!editScore&&!editChip)renderAll();
  },60000);
}
init();
</script>
